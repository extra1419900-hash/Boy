<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมกระโดดข้ามหัวใจ V.แก้จุดเกิด</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #222;
            display: flex; justify-content: center; align-items: center;
            touch-action: none;
        }

        /* จอใหญ่ 800px */
        #game-container {
            width: 800px;
            height: 400px;
            position: relative;
            overflow: hidden;
            background-image: url('https://i.postimg.cc/bNpy7BNk/mi-m-ch-x-298-20260404141457.png');
            background-size: 100% 100%;
            background-color: #ff69b4;
            border: 4px solid #fff;
        }

        #character {
            width: 100px;
            height: 100px;
            position: absolute;
            bottom: 20px;
            left: 50px;
            background-image: url('https://i.postimg.cc/j5McR9YX/mi-m-ch-x-298-20260404141500.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 2;
        }

        .jump {
            animation: jumpAnimation 0.7s ease-out;
        }

        @keyframes jumpAnimation {
            0% { bottom: 20px; }
            50% { bottom: 250px; }
            100% { bottom: 20px; }
        }

        #obstacle {
            width: 80px;
            height: 80px;
            position: absolute;
            bottom: 20px;
            left: 850px; /* ให้ไปรออยู่นอกจอนิดนึง */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 2;
        }

        #score-board {
            position: absolute;
            top: 20px; left: 20px;
            font-size: 24px; font-weight: bold; color: #fff;
            z-index: 5;
        }

        #jump-btn {
            position: absolute;
            bottom: 20px; right: 20px;
            width: 100px; height: 100px;
            background-color: rgba(255, 255, 255, 0.4);
            border: 3px solid #fff; border-radius: 50%;
            color: #fff; font-size: 20px; font-weight: bold;
            z-index: 10;
        }

        #reset-btn {
            position: absolute;
            top: 20px; right: 20px;
            padding: 10px 20px;
            background-color: #ff4444; color: #fff;
            border: none; border-radius: 10px;
            font-weight: bold; z-index: 10;
        }

        #menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; color: #fff;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">คะแนน: <span id="score">0</span> | สูงสุด: <span id="hi-score">0</span></div>
        <div id="character"></div>
        <div id="obstacle"></div>
        <div id="menu-overlay">
            <h1 id="status-text">พร้อมไหม?</h1>
            <button style="padding: 15px 40px; font-size: 20px;" onclick="startGame()">เริ่มเล่น!</button>
        </div>
        <button id="jump-btn">JUMP</button>
        <button id="reset-btn" onclick="resetGame()">RESET</button>
    </div>

    <script>
        const character = document.getElementById("character");
        const obstacle = document.getElementById("obstacle");
        const scoreText = document.getElementById("score");
        const hiScoreText = document.getElementById("hi-score");
        const menu = document.getElementById("menu-overlay");
        const jumpBtn = document.getElementById("jump-btn");

        let score = 0;
        let hiScore = localStorage.getItem("hiScore") || 0;
        let isAlive = false;
        let obstacleLeft = 850; 
        let gameSpeed = 8; 

        hiScoreText.innerText = hiScore;

        const imgJump = 'https://i.postimg.cc/Bn5xqyxQ/mi-m-ch-x-298-20260404141502.png';
        const imgStand = 'https://i.postimg.cc/j5McR9YX/mi-m-ch-x-298-20260404141500.png';
        const obsImgs = [
            'https://i.postimg.cc/bwR36dVK/mi-m-ch-x-298-20260404141505.png',
            'https://i.postimg.cc/zB4jLh3f/mi-m-ch-x-298-20260404141507.png'
        ];

        function jump() {
            if (!character.classList.contains("jump") && isAlive) {
                character.classList.add("jump");
                character.style.backgroundImage = `url('${imgJump}')`;
                setTimeout(() => {
                    character.classList.remove("jump");
                    character.style.backgroundImage = `url('${imgStand}')`;
                }, 700);
            }
        }

        function startGame() {
            menu.style.display = "none";
            isAlive = true;
            score = 0;
            obstacleLeft = 850;
            gameSpeed = 8;
            scoreText.innerText = "0";
            obstacle.style.backgroundImage = `url('${obsImgs[Math.floor(Math.random()*obsImgs.length)]}')`;
            requestAnimationFrame(gameLoop);
        }

        function resetGame() { location.reload(); }

        jumpBtn.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); });

        function gameLoop() {
            if (!isAlive) return;

            obstacleLeft -= gameSpeed;
            
            if (obstacleLeft < -100) {
                obstacleLeft = 850;
                score++;
                scoreText.innerText = score;
                gameSpeed += 0.2;
                obstacle.style.backgroundImage = `url('${obsImgs[Math.floor(Math.random()*obsImgs.length)]}')`;
            }
            obstacle.style.left = obstacleLeft + "px";

            let charBottom = parseInt(window.getComputedStyle(character).getPropertyValue("bottom"));

            // 💥 แก้ไข Hitbox ให้ชนยากขึ้น (ต้องชนจังๆ ถึงจะตาย)
            // ระยะ X: ตัวละครอยู่ 50-150px -> บีบเหลือ 80-120px
            // ระยะ Y: ตัวละครสูง 100px -> บีบเหลือ 70px
            if (obstacleLeft < 120 && obstacleLeft > 80 && charBottom <= 70) {
                isAlive = false;
                if (score > hiScore) {
                    localStorage.setItem("hiScore", score);
                    hiScoreText.innerText = score;
                }
                document.getElementById("status-text").innerText = "จบเกม! " + score + " คะแนน";
                menu.style.display = "flex";
            }

            if (isAlive) requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
