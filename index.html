<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมแมวพาสเทลกระโดดดึ๋ง</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* 🖼️ ปรับขนาดฉากเกมให้ใหญ่สะใจ (กว้าง 400px สูง 250px) */
        #game-container {
            width: 400px;
            height: 250px;
            border-bottom: 4px solid #535353;
            position: relative;
            overflow: hidden;
            background-image: url('https://i.postimg.cc/bNpy7BNk/mi-m-ch-x-298-20260404141457.png');
            background-size: auto 100%;
            background-repeat: repeat-x;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 🐈‍⬛ ขยายขนาดตัวละครน้องแมวเป็น 120x120 พิกเซล (ใหญ่เต็มตา) */
        #dino {
            width: 120px;
            height: 120px;
            position: absolute;
            bottom: 5px;
            left: 30px;
            background-image: url('https://i.postimg.cc/R0MwqRRd/mi-m-ch-x-298-20260404141503.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* คลาสสำหรับอนิเมชั่นเดิน (2 เฟรม) */
        .walking {
            animation: walkAnimation 0.6s steps(2) infinite;
        }

        @keyframes walkAnimation {
            from {
                background-image: url('https://i.postimg.cc/Bn5xqyxQ/mi-m-ch-x-298-20260404141502.png');
                background-position: 0;
            }
            to {
                background-image: url('https://i.postimg.cc/Bn5xqyxQ/mi-m-ch-x-298-20260404141502.png');
                background-position: -240px; /* ขยายพิกัดตามขนาดตัวที่ใหญ่ขึ้น */
            }
        }

        /* ตอนกระโดดให้ใช้รูปโดด และปิดอนิเมชั่นเดิน */
        #dino.jumping {
            background-image: url('https://i.postimg.cc/R0MwqRRd/mi-m-ch-x-298-20260404141503.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: none;
        }

        .jump {
            animation: jumpAnimation 0.7s ease-out; /* ลอยนานขึ้นเล็กน้อยตามสเกลที่ใหญ่ขึ้น */
        }

        @keyframes jumpAnimation {
            0% { bottom: 5px; }
            50% { bottom: 130px; } /* ความสูงการโดดที่สัมพันธ์กับตัวละคร */
            100% { bottom: 5px; }
        }

        /* 📦 ขยายขนาดสิ่งกีดขวางเป็น 60x60 พิกเซล */
        #cactus {
            width: 60px;
            height: 60px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: absolute;
            bottom: 5px;
            left: 400px;
        }

        /* UI คะแนน */
        #score-board {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: bold;
            color: #535353;
        }
        .score-box {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 4px 8px;
            border-radius: 5px;
        }

        /* 🎬 หน้าเมนูก่อนเริ่มเล่น และหน้าจบเกม */
        #menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #menu-title {
            font-size: 24px;
            font-weight: bold;
            color: #ff85a2; /* สีชมพูพาสเทลเข้ากับธีมคุณ */
            margin-bottom: 20px;
            text-shadow: 1px 1px 0px #fff;
        }

        #play-btn {
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background-color: #ffb3c6;
            border: none;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.2s;
        }

        #play-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">
            <div class="score-box" id="hi-score">สูงสุด: 0</div>
            <div class="score-box" id="score">คะแนน: 0</div>
        </div>
        
        <div id="dino"></div>
        <div id="cactus"></div>

        <div id="menu-overlay">
            <div id="menu-title">เกมแมวพาสเทลจอมโดด</div>
            <button id="play-btn" onclick="startGame()">PLAY</button>
        </div>
    </div>

    <script>
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        const scoreDisplay = document.getElementById("score");
        const hiScoreDisplay = document.getElementById("hi-score");
        const gameContainer = document.getElementById("game-container");
        const menuOverlay = document.getElementById("menu-overlay");
        const menuTitle = document.getElementById("menu-title");

        let score = 0;
        let hiScore = localStorage.getItem("catGameHiScore") || 0; // ดึงคะแนนสูงสุดที่เซฟไว้
        let isAlive = false;
        let gameSpeed = 1.8; // 🐢 ปรับให้วิ่งช้าโคตรๆ ในตอนแรก (เดิม 2.5) เพื่อความชิลล์
        let cactusLeft = 400;
        let backgroundPos = 0;

        const obstacleImages = [
            'https://i.postimg.cc/bwR36dVK/mi-m-ch-x-298-20260404141505.png', // ปลา
            'https://i.postimg.cc/zB4jLh3f/mi-m-ch-x-298-20260404141507.png'  // กล่อง
        ];

        // อัปเดตการแสดงผลคะแนนสูงสุดตอนเปิดหน้าเว็บ
        hiScoreDisplay.innerText = "สูงสุด: " + hiScore;

        function setRandomObstacle() {
            const randomIndex = Math.floor(Math.random() * obstacleImages.length);
            cactus.style.backgroundImage = `url('${obstacleImages[randomIndex]}')`;
        }

        function jump() {
            if (!dino.classList.contains("jump") && isAlive) {
                dino.classList.add("jump");
                dino.classList.add("jumping");
                
                setTimeout(function () {
                    dino.classList.remove("jump");
                    dino.classList.remove("jumping");
                }, 700);
            }
        }

        // ฟังก์ชันเริ่มเกม (เรียกใช้เมื่อกดปุ่ม Play)
        function startGame() {
            menuOverlay.style.display = "none"; // ซ่อนหน้าเมนู
            isAlive = true;
            score = 0;
            gameSpeed = 1.8;
            cactusLeft = 400;
            scoreDisplay.innerText = "คะแนน: 0";
            dino.classList.add("walking"); // เริ่มอนิเมชั่นเดิน
            setRandomObstacle();
            gameLoop();
        }

        // แตะที่ฉากเพื่อกระโดด (สำหรับมือถือ)
        gameContainer.addEventListener("touchstart", function (e) {
            e.preventDefault();
            jump();
        });

        function gameLoop() {
            if (!isAlive) return;

            // เลื่อนพื้นหลังให้สัมพันธ์กับการเล่น (ขยับแบบ Manual เพื่อให้หยุดพร้อมเกมได้)
            backgroundPos -= gameSpeed / 2;
            gameContainer.style.backgroundPosition = backgroundPos + "px 0";

            // เลื่อนสิ่งกีดขวาง
            cactusLeft -= gameSpeed;
            if (cactusLeft < -60) {
                cactusLeft = 400;
                setRandomObstacle();
                score++;
                scoreDisplay.innerText = "คะแนน: " + score;
                
                // ค่อยๆ เพิ่มความเร็วแบบเนิบๆ ทุก 3 คะแนน
                if (score % 3 === 0 && gameSpeed < 8) {
                    gameSpeed += 0.3;
                }
            }
            cactus.style.left = cactusLeft + "px";

            let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));

            // 💥 ตรวจสอบการชนสำหรับร่างยักษ์
            // ตัวละครกว้าง 120px อยู่ที่ left: 30px ถึง 150px
            // สิ่งกีดขวางกว้าง 60px
            if (cactusLeft < 130 && cactusLeft > 10 && dinoBottom <= 60) {
                isAlive = false;
                dino.classList.remove("walking"); // หยุดเดิน
                
                // ตรวจสอบและบันทึกคะแนนสูงสุด
                if (score > hiScore) {
                    hiScore = score;
                    localStorage.setItem("catGameHiScore", hiScore); // เซฟลงเครื่อง
                    hiScoreDisplay.innerText = "สูงสุด: " + hiScore;
                }

                // แสดงผลหน้าจบเกม
                menuTitle.innerText = "เกมจบแล้ว! (ได้ " + score + " คะแนน)";
                menuOverlay.style.display = "flex";
            }

            if (isAlive) {
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
