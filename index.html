<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมแมวพาสเทลกระโดดดึ๋ง</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f7f7f7;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* 🖼️ ปรับขนาดฉากเกมให้ใหญ่ขึ้น (กว้าง 360px สูง 200px) */
        #game-container {
            width: 360px;
            height: 200px;
            border-bottom: 3px solid #535353;
            position: relative;
            overflow: hidden;
            background-image: url('https://i.postimg.cc/bNpy7BNk/mi-m-ch-x-298-20260404141457.png');
            background-size: auto 100%;
            background-repeat: repeat-x;
            animation: backgroundScroll 15s linear infinite; /* ปรับพื้นหลังให้เลื่อนช้าลงสบายตา */
        }

        @keyframes backgroundScroll {
            from { background-position: 0 0; }
            to { background-position: -600px 0; }
        }

        /* 🐈‍⬛ ขยายขนาดตัวละครแมวเป็น 70x70 px */
        #dino {
            width: 70px;
            height: 70px;
            position: absolute;
            bottom: 5px;
            left: 30px;
            background-image: url('https://i.postimg.cc/R0MwqRRd/mi-m-ch-x-298-20260404141503.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: walkAnimation 0.6s steps(2) infinite; /* เดินช้าลงนิดนึงให้ดูน่ารัก */
        }

        @keyframes walkAnimation {
            from {
                background-image: url('https://i.postimg.cc/Bn5xqyxQ/mi-m-ch-x-298-20260404141502.png');
                background-position: 0;
            }
            to {
                background-image: url('https://i.postimg.cc/Bn5xqyxQ/mi-m-ch-x-298-20260404141502.png');
                background-position: -140px; /* ปรับตามขนาดตัวที่ใหญ่ขึ้น */
            }
        }

        #dino.jumping {
            background-image: url('https://i.postimg.cc/R0MwqRRd/mi-m-ch-x-298-20260404141503.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: none;
        }

        /* ปรับอนิเมชั่นกระโดดให้ลอยนานขึ้นนิดนึง จะได้หลบง่ายขึ้น */
        .jump {
            animation: jumpAnimation 0.6s ease-out;
        }

        @keyframes jumpAnimation {
            0% { bottom: 5px; }
            50% { bottom: 110px; } /* กระโดดสูงขึ้น */
            100% { bottom: 5px; }
        }

        /* 📦 ขยายขนาดสิ่งกีดขวางเป็น 45x45 px ให้เห็นชัดๆ */
        #cactus {
            width: 45px;
            height: 45px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: absolute;
            bottom: 5px;
            left: 360px;
        }

        #score {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #535353;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 3px 8px;
            border-radius: 5px;
        }
        
        /* เพิ่มข้อความบอกให้แตะเพื่อเล่น */
        #tap-to-start {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #535353;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score">คะแนน: 0</div>
        <div id="dino"></div>
        <div id="cactus"></div>
        <div id="tap-to-start">แตะเพื่อเริ่มใหม่</div>
    </div>

    <script>
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        const scoreDisplay = document.getElementById("score");
        const gameContainer = document.getElementById("game-container");
        const tapToStart = document.getElementById("tap-to-start");

        let score = 0;
        let isAlive = true;
        let gameSpeed = 2.5; // 🐢 ลดความเร็วเริ่มต้นลงเยอะมาก (จากเดิม 4) ให้เล่นง่ายขึ้น

        const obstacleImages = [
            'https://i.postimg.cc/bwR36dVK/mi-m-ch-x-298-20260404141505.png',
            'https://i.postimg.cc/zB4jLh3f/mi-m-ch-x-298-20260404141507.png'
        ];

        function setRandomObstacle() {
            const randomIndex = Math.floor(Math.random() * obstacleImages.length);
            cactus.style.backgroundImage = `url('${obstacleImages[randomIndex]}')`;
        }

        function jump() {
            if (!dino.classList.contains("jump") && isAlive) {
                dino.classList.add("jump");
                dino.classList.add("jumping");
                
                setTimeout(function () {
                    dino.classList.remove("jump");
                    dino.classList.remove("jumping");
                }, 600);
            }
        }

        // ระบบแตะหน้าจอ
        gameContainer.addEventListener("touchstart", function (e) {
            e.preventDefault();
            if (!isAlive) {
                // ถ้าตายอยู่ ให้เริ่มเกมใหม่
                isAlive = true;
                score = 0;
                cactusLeft = 360;
                gameSpeed = 2.5;
                scoreDisplay.innerText = "คะแนน: 0";
                tapToStart.style.display = "none";
                setRandomObstacle();
                gameLoop();
            } else {
                jump();
            }
        });

        let cactusLeft = 360;
        setRandomObstacle();

        function gameLoop() {
            if (!isAlive) return;

            cactusLeft -= gameSpeed;
            if (cactusLeft < -45) {
                cactusLeft = 360;
                setRandomObstacle();
                score++;
                scoreDisplay.innerText = "คะแนน: " + score;
                
                // เพิ่มความเร็วแบบค่อยเป็นค่อยไป ทุกๆ 3 คะแนน
                if (score % 3 === 0 && gameSpeed < 8) {
                    gameSpeed += 0.4;
                }
            }
            cactus.style.left = cactusLeft + "px";

            let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));

            // 💥 ปรับพิกัดการชนใหม่ให้เป๊ะขึ้นตามขนาดตัวละครที่ใหญ่ขึ้น
            // ตัวละครอยู่พิกัด left: 30px ถึง 100px
            if (cactusLeft < 85 && cactusLeft > 15 && dinoBottom <= 45) {
                isAlive = false;
                alert("จบเกม! คะแนนของคุณคือ: " + score);
                tapToStart.style.display = "block"; // แสดงข้อความให้แตะเริ่มใหม่
            }

            if (isAlive) {
                requestAnimationFrame(gameLoop);
            }
        }

        gameLoop();
    </script>
</body>
</html>
