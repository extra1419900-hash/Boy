<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมกระโดดข้ามหัวใจ</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
            display: flex; justify-content: center; align-items: center;
            font-family: Arial, sans-serif;
            touch-action: none;
        }

        /* 🖼️ ปรับขนาดฉากเกมให้พอดีกับภาพในคลิปคุณ (กว้าง 360px สูง 200px) */
        #game-container {
            width: 360px;
            height: 200px;
            position: relative;
            overflow: hidden;
            background-image: url('https://i.postimg.cc/bNpy7BNk/mi-m-ch-x-298-20260404141457.png');
            background-size: 100% 100%;
            background-color: #ff69b4;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 🧍‍♂️ ตัวละครของคุณ (ปรับสเกลให้พอดี ไม่ใหญ่เกินไป) */
        #character {
            width: 50px;
            height: 50px;
            position: absolute;
            bottom: 5px;
            left: 20px;
            background-image: url('https://i.postimg.cc/j5McR9YX/mi-m-ch-x-298-20260404141500.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* อนิเมชั่นกระโดดให้เหินแบบพอดีๆ */
        .jump {
            animation: jumpAnimation 0.6s ease-out;
        }

        @keyframes jumpAnimation {
            0% { bottom: 5px; }
            50% { bottom: 100px; }
            100% { bottom: 5px; }
        }

        /* 📦 สิ่งกีดขวาง (ขยายให้ใหญ่ขึ้นตามที่คุณสั่ง!) */
        #obstacle {
            width: 40px;
            height: 40px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: absolute;
            bottom: 5px;
            left: 360px;
        }

        #score-board {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between;
            font-size: 14px; font-weight: bold; color: #535353;
            z-index: 5;
        }
        .score-box {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 3px 6px; border-radius: 5px;
        }

        #menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.85);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10;
        }

        #menu-title {
            font-size: 20px; font-weight: bold; color: #ff5c8a;
            margin-bottom: 10px; text-align: center;
        }

        #play-btn {
            padding: 10px 20px;
            font-size: 16px; font-weight: bold;
            color: white; background-color: #ff5c8a;
            border: none; border-radius: 20px;
            cursor: pointer;
        }

        /* 🕹️ ปุ่มกระโดดแยก คราวนี้โดดได้แน่นอน! */
        #jump-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 60px;
            height: 60px;
            background-color: rgba(255, 92, 138, 0.6);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">
            <div class="score-box" id="hi-score">สูงสุด: 0</div>
            <div class="score-box" id="score">คะแนน: 0</div>
        </div>
        
        <div id="character"></div>
        <div id="obstacle"></div>

        <div id="menu-overlay">
            <div id="menu-title">ยินดีต้อนรับสู่เกมของคุณ!</div>
            <button id="play-btn" onclick="startGame()">PLAY</button>
        </div>

        <button id="jump-btn">JUMP</button>
    </div>

    <script>
        const character = document.getElementById("character");
        const obstacle = document.getElementById("obstacle");
        const scoreDisplay = document.getElementById("score");
        const hiScoreDisplay = document.getElementById("hi-score");
        const menuOverlay = document.getElementById("menu-overlay");
        const menuTitle = document.getElementById("menu-title");
        const jumpBtn = document.getElementById("jump-btn");

        let score = 0;
        let hiScore = localStorage.getItem("myGameHiScore") || 0;
        let isAlive = false;
        let gameSpeed = 1.0; 
        let obstacleLeft = 360;

        const imgJump = 'https://i.postimg.cc/Bn5xqyxQ/mi-m-ch-x-298-20260404141502.png'; // ท่ากระโดด
        const imgStand = 'https://i.postimg.cc/j5McR9YX/mi-m-ch-x-298-20260404141500.png'; // ท่าหยุด
        
        const obstacleImages = [
            'https://i.postimg.cc/bwR36dVK/mi-m-ch-x-298-20260404141505.png', // ปลา
            'https://i.postimg.cc/zB4jLh3f/mi-m-ch-x-298-20260404141507.png'  // กล่อง
        ];

        hiScoreDisplay.innerText = "สูงสุด: " + hiScore;

        function setRandomObstacle() {
            const randomIndex = Math.floor(Math.random() * obstacleImages.length);
            obstacle.style.backgroundImage = `url('${obstacleImages[randomIndex]}')`;
        }

        function jump() {
            if (!character.classList.contains("jump") && isAlive) {
                character.classList.add("jump");
                character.style.backgroundImage = `url('${imgJump}')`; // เปลี่ยนรูปกระโดด
                
                setTimeout(function () {
                    character.classList.remove("jump");
                    character.style.backgroundImage = `url('${imgStand}')`; // กลับมายืนท่าเดิม
                }, 600);
            }
        }

        function startGame() {
            menuOverlay.style.display = "none";
            isAlive = true;
            score = 0;
            gameSpeed = 1.0; // ช้ามากระดับเต่าคลานให้คุณชิลล์ก่อน
            obstacleLeft = 360;
            scoreDisplay.innerText = "คะแนน: 0";
            setRandomObstacle();
            gameLoop();
        }

        // เชื่อมปุ่มกดกระโดด
        jumpBtn.addEventListener("touchstart", function(e) {
            e.preventDefault();
            jump();
        });

        function gameLoop() {
            if (!isAlive) return;

            obstacleLeft -= gameSpeed;
            
            // ขยายสิ่งกีดขวางให้พ้นหน้าจอ ค่อยสลับรูปใหม่
            if (obstacleLeft < -40) {
                obstacleLeft = 360;
                setRandomObstacle();
                score++;
                scoreDisplay.innerText = "คะแนน: " + score;
                
                // ทุกๆ 5 คะแนนจะเร็วขึ้นนิดเดียว
                if (score % 5 === 0 && gameSpeed < 6) {
                    gameSpeed += 0.3;
                }
            }
            obstacle.style.left = obstacleLeft + "px";

            let charBottom = parseInt(window.getComputedStyle(character).getPropertyValue("bottom"));

            // 💥 ตัวเช็กระยะชนแบบใหม่ที่ปรับให้ตัวละครผอมของคุณโดยเฉพาะ!
            // ตัวละครอยู่ left: 20px และกว้าง 50px (Hitbox จริงๆ จะอยู่ช่วง left: 20 ถึง 70)
            if (obstacleLeft < 70 && obstacleLeft > 10 && charBottom <= 40) {
                isAlive = false;
                
                if (score > hiScore) {
                    hiScore = score;
                    localStorage.setItem("myGameHiScore", hiScore);
                    hiScoreDisplay.innerText = "สูงสุด: " + hiScore;
                }

                menuTitle.innerText = "จบเกม! ได้ " + score + " คะแนน";
                document.getElementById("play-btn").innerText = "PLAY AGAIN";
                menuOverlay.style.display = "flex";
            }

            if (isAlive) {
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
