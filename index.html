<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมแมวพาสเทลกระโดดดึ๋ง</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            touch-action: none;
        }

        /* 🖼️ ขยายหน้าจอเกมให้ใหญ่ขึ้น (กว้าง 400px สูง 300px) */
        #game-container {
            width: 400px;
            height: 300px;
            border-bottom: 5px solid #535353;
            position: relative;
            overflow: hidden;
            background-image: url('https://i.postimg.cc/bNpy7BNk/mi-m-ch-x-298-20260404141457.png');
            background-size: auto 100%;
            background-repeat: repeat-x;
            background-color: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* 🐈‍⬛ ตัวละครน้องแมว (ขนาด 100x100px) */
        #dino {
            width: 100px;
            height: 100px;
            position: absolute;
            bottom: 5px;
            left: 30px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* ปรับอนิเมชั่นกระโดดให้ลอยสูงขึ้นและนานขึ้นตามขนาดฉากที่สูงขึ้น */
        .jump {
            animation: jumpAnimation 0.8s ease-out;
        }

        @keyframes jumpAnimation {
            0% { bottom: 5px; }
            50% { bottom: 150px; } /* กระโดดสูงขึ้น */
            100% { bottom: 5px; }
        }

        /* 📦 สิ่งกีดขวางขยายใหญ่เต็มตา (ขนาด 70x70px) */
        #cactus {
            width: 70px;
            height: 70px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: absolute;
            bottom: 5px;
            left: 400px;
        }

        /* UI คะแนน */
        #score-board {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: bold;
            color: #535353;
            z-index: 5;
        }
        .score-box {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 4px 8px;
            border-radius: 5px;
        }

        /* หน้าเมนูเริ่มต้นและจบเกม */
        #menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #menu-title {
            font-size: 24px;
            font-weight: bold;
            color: #ff85a2;
            margin-bottom: 15px;
            text-align: center;
        }

        #menu-subtitle {
            font-size: 16px;
            color: #777;
            animation: flash 1.5s infinite;
        }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">
            <div class="score-box" id="hi-score">สูงสุด: 0</div>
            <div class="score-box" id="score">คะแนน: 0</div>
        </div>
        
        <div id="dino"></div>
        <div id="cactus"></div>

        <div id="menu-overlay">
            <div id="menu-title">เกมแมวพาสเทลจอมโดด</div>
            <div id="menu-subtitle">แตะที่หน้าจอเพื่อเริ่มเล่น</div>
        </div>
    </div>

    <script>
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        const scoreDisplay = document.getElementById("score");
        const hiScoreDisplay = document.getElementById("hi-score");
        const gameContainer = document.getElementById("game-container");
        const menuOverlay = document.getElementById("menu-overlay");
        const menuTitle = document.getElementById("menu-title");
        const menuSubtitle = document.getElementById("menu-subtitle");

        let score = 0;
        let hiScore = localStorage.getItem("catGameHiScore") || 0;
        let isAlive = false;
        let gameSpeed = 1.2; // เริ่มต้นช้าสบายๆ
        let cactusLeft = 400;
        let backgroundPos = 0;
        let gameLoopActive = false;

        // ตัวแปรสำหรับคุมอนิเมชั่นเดิน (แก้บั๊กภาพกะพริบ)
        let walkInterval;
        let currentWalkFrame = 0;

        // 🔗 ลิงก์รูปภาพตามที่คุณสั่งเป๊ะๆ
        const imgStandAndWalk1 = 'https://i.postimg.cc/j5McR9YX/mi-m-ch-x-298-20260404141500.png'; // ท่ายืน/เดิน1
        const imgWalk2 = 'https://i.postimg.cc/R0MwqRRd/mi-m-ch-x-298-20260404141503.png'; // ท่าเดิน2
        const imgJump = 'https://i.postimg.cc/Bn5xqyxQ/mi-m-ch-x-298-20260404141502.png'; // ท่ากระโดด
        
        const obstacleImages = [
            'https://i.postimg.cc/bwR36dVK/mi-m-ch-x-298-20260404141505.png', // ปลา
            'https://i.postimg.cc/zB4jLh3f/mi-m-ch-x-298-20260404141507.png'  // กล่อง
        ];

        // โหลดคะแนนสูงสุด
        hiScoreDisplay.innerText = "สูงสุด: " + hiScore;
        
        // ตั้งรูปเริ่มต้นเป็นท่ายืนนิ่ง
        dino.style.backgroundImage = `url('${imgStandAndWalk1}')`;

        function setRandomObstacle() {
            const randomIndex = Math.floor(Math.random() * obstacleImages.length);
            cactus.style.backgroundImage = `url('${obstacleImages[randomIndex]}')`;
        }

        // ระบบสลับภาพเดินเพื่อแก้บั๊กภาพกะพริบ
        function startWalkingAnimation() {
            clearInterval(walkInterval);
            walkInterval = setInterval(() => {
                if (!dino.classList.contains("jump") && isAlive) {
                    if (currentWalkFrame === 0) {
                        dino.style.backgroundImage = `url('${imgStandAndWalk1}')`;
                        currentWalkFrame = 1;
                    } else {
                        dino.style.backgroundImage = `url('${imgWalk2}')`;
                        currentWalkFrame = 0;
                    }
                }
            }, 300); // สลับรูปทุกๆ 0.3 วินาที (ไม่เร็วเกินไป)
        }

        function jump() {
            if (!dino.classList.contains("jump") && isAlive) {
                dino.classList.add("jump");
                dino.style.backgroundImage = `url('${imgJump}')`; // เปลี่ยนเป็นรูปกระโดดทันที
                
                setTimeout(function () {
                    dino.classList.remove("jump");
                    // พอกลับมาถึงพื้นให้แสดงผลเป็นรูปเดินต่อทันที
                    dino.style.backgroundImage = `url('${currentWalkFrame === 0 ? imgStandAndWalk1 : imgWalk2}')`;
                }, 800);
            }
        }

        function triggerAction(e) {
            e.preventDefault();

            if (!isAlive) {
                menuOverlay.style.display = "none";
                isAlive = true;
                score = 0;
                gameSpeed = 1.2;
                cactusLeft = 400;
                scoreDisplay.innerText = "คะแนน: 0";
                setRandomObstacle();
                startWalkingAnimation(); // เริ่มอนิเมชั่นเดิน
                
                if (!gameLoopActive) {
                    gameLoop();
                }
            } else {
                jump();
            }
        }

        gameContainer.addEventListener("touchstart", triggerAction);

        function gameLoop() {
            if (!isAlive) {
                gameLoopActive = false;
                clearInterval(walkInterval);
                dino.style.backgroundImage = `url('${imgStandAndWalk1}')`; // ตายแล้วยืนนิ่ง
                return;
            }
            gameLoopActive = true;

            // เลื่อนพื้นหลัง
            backgroundPos -= gameSpeed / 2;
            gameContainer.style.backgroundPosition = backgroundPos + "px 0";

            // เลื่อนสิ่งกีดขวาง
            cactusLeft -= gameSpeed;
            if (cactusLeft < -70) {
                cactusLeft = 400;
                setRandomObstacle();
                score++;
                scoreDisplay.innerText = "คะแนน: " + score;
                
                // ค่อยๆ เร็วขึ้นทุกๆ 5 คะแนน
                if (score % 5 === 0 && gameSpeed < 8) {
                    gameSpeed += 0.3;
                }
            }
            cactus.style.left = cactusLeft + "px";

            let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));

            // 💥 เช็กการชน (ปรับ Hitbox ใหม่ให้ไม่หยุดเองมั่วซั่ว)
            // ตัวแมวอยู่แถว left: 30px ถึง 110px กว้างจริง 100px แต่เราลบขอบรูปออกให้เหลือส่วนชนจริงแค่ 20px ถึง 80px
            if (cactusLeft < 80 && cactusLeft > 10 && dinoBottom <= 60) {
                isAlive = false;
                
                if (score > hiScore) {
                    hiScore = score;
                    localStorage.setItem("catGameHiScore", hiScore);
                    hiScoreDisplay.innerText = "สูงสุด: " + hiScore;
                }

                menuTitle.innerText = "จบเกม! ได้ " + score + " คะแนน";
                menuSubtitle.innerText = "แตะที่หน้าจออีกครั้งเพื่อเริ่มใหม่";
                menuOverlay.style.display = "flex";
            }

            if (isAlive) {
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
