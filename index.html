<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมกระโดดข้ามสิ่งกีดขวาง</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
            display: flex; justify-content: center; align-items: center;
            font-family: Arial, sans-serif;
            touch-action: none;
        }

        /* 🖼️ ฉากเกม */
        #game-container {
            width: 360px;
            height: 200px;
            position: relative;
            overflow: hidden;
            background-image: url('https://i.postimg.cc/bNpy7BNk/mi-m-ch-x-298-20260404141457.png');
            background-size: 100% 100%;
            background-color: #ff69b4;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 🧍‍♂️ ตัวละครของคุณ */
        #character {
            width: 50px;
            height: 50px;
            position: absolute;
            bottom: 5px;
            left: 20px;
            background-image: url('https://i.postimg.cc/j5McR9YX/mi-m-ch-x-298-20260404141500.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .jump {
            animation: jumpAnimation 0.6s ease-out;
        }

        @keyframes jumpAnimation {
            0% { bottom: 5px; }
            50% { bottom: 100px; }
            100% { bottom: 5px; }
        }

        /* 📦 สิ่งกีดขวาง */
        #obstacle {
            width: 40px;
            height: 40px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: absolute;
            bottom: 5px;
            left: 360px;
        }

        #score-board {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between;
            font-size: 14px; font-weight: bold; color: #535353;
            z-index: 5;
        }
        .score-box {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 3px 6px; border-radius: 5px;
        }

        #menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.85);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10;
        }

        #menu-title {
            font-size: 20px; font-weight: bold; color: #ff5c8a;
            margin-bottom: 10px; text-align: center;
        }

        #play-btn {
            padding: 10px 20px;
            font-size: 16px; font-weight: bold;
            color: white; background-color: #ff5c8a;
            border: none; border-radius: 20px;
            cursor: pointer;
        }

        /* 🕹️ ปุ่มกระโดดแยก */
        #jump-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 60px;
            height: 60px;
            background-color: rgba(255, 92, 138, 0.6);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        /* 🔄 ปุ่ม Reset */
        #reset-btn {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 60px;
            height: 30px;
            background-color: rgba(255, 68, 68, 0.7);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">
            <div class="score-box" id="hi-score">สูงสุด: 0</div>
            <div class="score-box" id="score">คะแนน: 0</div>
        </div>
        
        <div id="character"></div>
        <div id="obstacle"></div>

        <div id="menu-overlay">
            <div id="menu-title">ยินดีต้อนรับสู่เกมของคุณ!</div>
            <button id="play-btn" onclick="startGame()">PLAY</button>
        </div>

        <button id="jump-btn">JUMP</button>
        <button id="reset-btn" onclick="resetGame()">RESET</button>
    </div>

    <script>
        const character = document.getElementById("character");
        const obstacle = document.getElementById("obstacle");
        const scoreDisplay = document.getElementById("score");
        const hiScoreDisplay = document.getElementById("hi-score");
        const menuOverlay = document.getElementById("menu-overlay");
        const menuTitle = document.getElementById("menu-title");
        const jumpBtn = document.getElementById("jump-btn");

        let score = 0;
        let hiScore = localStorage.getItem("myGameHiScore") || 0;
        let isAlive = false;
        let gameSpeed = 1.0; 
        let obstacleLeft = 360;

        const imgJump = 'https://i.postimg.cc/Bn5xqyxQ/mi-m-ch-x-298-20260404141502.png'; 
        const imgStand = 'https://i.postimg.cc/j5McR9YX/mi-m-ch-x-298-20260404141500.png'; 
        
        const obstacleImages = [
            'https://i.postimg.cc/bwR36dVK/mi-m-ch-x-298-20260404141505.png', 
            'https://i.postimg.cc/zB4jLh3f/mi-m-ch-x-298-20260404141507.png'  
        ];

        hiScoreDisplay.innerText = "สูงสุด: " + hiScore;

        function setRandomObstacle() {
            const randomIndex = Math.floor(Math.random() * obstacleImages.length);
            obstacle.style.backgroundImage = `url('${obstacleImages[randomIndex]}')`;
        }

        function jump() {
            if (!character.classList.contains("jump") && isAlive) {
                character.classList.add("jump");
                character.style.backgroundImage = `url('${imgJump}')`; 
                
                setTimeout(function () {
                    character.classList.remove("jump");
                    character.style.backgroundImage = `url('${imgStand}')`; 
                }, 600);
            }
        }

        function startGame() {
            menuOverlay.style.display = "none";
            isAlive = true;
            score = 0;
            gameSpeed = 1.0; 
            obstacleLeft = 360;
            scoreDisplay.innerText = "คะแนน: 0";
            setRandomObstacle();
            gameLoop();
        }

        // ฟังก์ชันรีเซ็ตเกมใหม่ทั้งหมด
        function resetGame() {
            isAlive = false;
            score = 0;
            gameSpeed = 1.0;
            obstacleLeft = 360;
            scoreDisplay.innerText = "คะแนน: 0";
            obstacle.style.left = "360px";
            character.classList.remove("jump");
            character.style.bottom = "5px";
            character.style.backgroundImage = `url('${imgStand}')`;
            
            menuTitle.innerText = "เกมถูกรีเซ็ตแล้ว!";
            document.getElementById("play-btn").innerText = "PLAY";
            menuOverlay.style.display = "flex";
        }

        jumpBtn.addEventListener("touchstart", function(e) {
            e.preventDefault();
            jump();
        });

        function gameLoop() {
            if (!isAlive) return;

            obstacleLeft -= gameSpeed;
            
            if (obstacleLeft < -40) {
                obstacleLeft = 360;
                setRandomObstacle();
                score++;
                scoreDisplay.innerText = "คะแนน: " + score;
                
                if (score % 5 === 0 && gameSpeed < 6) {
                    gameSpeed += 0.3;
                }
            }
            obstacle.style.left = obstacleLeft + "px";

            let charBottom = parseInt(window.getComputedStyle(character).getPropertyValue("bottom"));

            // 💥 ตัวเช็กระยะชนแบบใหม่ที่ใจดีขึ้น ไม่ชนทิพย์แล้ว!
            // ตัวละครอยู่พิกัด 20px ถึง 70px (ลดขอบเพื่อความเป๊ะ เหลือ 35px ถึง 60px)
            // ตัวสิ่งกีดขวางมีขนาด 40px (เราตรวจจับเฉพาะตอนที่มันเข้ามาลึกๆ เท่านั้น)
            if (obstacleLeft < 55 && obstacleLeft > 30 && charBottom <= 35) {
                isAlive = false;
                
                if (score > hiScore) {
                    hiScore = score;
                    localStorage.setItem("myGameHiScore", hiScore);
                    hiScoreDisplay.innerText = "สูงสุด: " + hiScore;
                }

                menuTitle.innerText = "จบเกม! ได้ " + score + " คะแนน";
                document.getElementById("play-btn").innerText = "PLAY AGAIN";
                menuOverlay.style.display = "flex";
            }

            if (isAlive) {
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
