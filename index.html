<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมแมวพาสเทลจอมโดด (ใหญ่ ชิลล์ ไม่บั๊ก)</title>
    <style>
        /* ล็อกไม่ให้หน้าจอเลื่อนไปมาเวลาเล่น */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            touch-action: none; /* ล็อกไม่ให้หน้าจอซูมหรือเลื่อน */
        }

        /* 🖼️ ปรับขนาดฉากเกมให้ใหญ่เต็มตากลางจอ (กว้าง 400px สูง 250px) */
        #game-container {
            width: 400px;
            height: 250px;
            border-bottom: 5px solid #535353;
            position: relative;
            overflow: hidden;
            background-image: url('https://i.postimg.cc/bNpy7BNk/mi-m-ch-x-298-20260404141457.png');
            background-size: auto 100%;
            background-repeat: repeat-x;
            background-color: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            touch-action: none; /* ล็อกไม่ให้หน้าจอซูมหรือเลื่อนเวลาแตะ */
        }

        /* 🐈‍⬛ ตัวละครน้องแมวขยายขนาดใหญ่สะใจ 100x100 */
        #dino {
            width: 100px;
            height: 100px;
            position: absolute;
            bottom: 5px;
            left: 30px;
            background-image: url('https://i.postimg.cc/R0MwqRRd/mi-m-ch-x-298-20260404141503.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .walking {
            animation: walkAnimation 0.6s steps(2) infinite;
        }

        @keyframes walkAnimation {
            from {
                background-image: url('https://i.postimg.cc/Bn5xqyxQ/mi-m-ch-x-298-20260404141502.png');
                background-position: 0;
            }
            to {
                background-image: url('https://i.postimg.cc/Bn5xqyxQ/mi-m-ch-x-298-20260404141502.png');
                background-position: -200px;
            }
        }

        #dino.jumping {
            background-image: url('https://i.postimg.cc/R0MwqRRd/mi-m-ch-x-298-20260404141503.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: none;
        }

        /* ปรับให้กระโดดลอยนานขึ้น หลบง่ายขึ้น */
        .jump {
            animation: jumpAnimation 0.8s ease-out;
        }

        @keyframes jumpAnimation {
            0% { bottom: 5px; }
            50% { bottom: 130px; }
            100% { bottom: 5px; }
        }

        /* 📦 สิ่งกีดขวางขยายใหญ่เป็น 60x60 ให้เห็นชัดๆ */
        #cactus {
            width: 60px;
            height: 60px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: absolute;
            bottom: 5px;
            left: 400px;
        }

        #score-board {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: bold;
            color: #535353;
            z-index: 5; /* ให้อยู่เหนือฉากหลัง */
        }
        .score-box {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 4px 8px;
            border-radius: 5px;
        }

        /* 🎬 หน้าเมนูเริ่มต้นและจบเกม */
        #menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #menu-title {
            font-size: 24px;
            font-weight: bold;
            color: #ff85a2;
            margin-bottom: 15px;
            text-align: center;
        }

        #menu-subtitle {
            font-size: 16px;
            color: #777;
            animation: flash 1.5s infinite;
        }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">
            <div class="score-box" id="hi-score">สูงสุด: 0</div>
            <div class="score-box" id="score">คะแนน: 0</div>
        </div>
        
        <div id="dino"></div>
        <div id="cactus"></div>

        <div id="menu-overlay">
            <div id="menu-title">เกมแมวพาสเทลจอมโดด</div>
            <div id="menu-subtitle">แตะที่หน้าจอเพื่อเริ่มเล่น</div>
        </div>
    </div>

    <script>
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        const scoreDisplay = document.getElementById("score");
        const hiScoreDisplay = document.getElementById("hi-score");
        const gameContainer = document.getElementById("game-container");
        const menuOverlay = document.getElementById("menu-overlay");
        const menuTitle = document.getElementById("menu-title");
        const menuSubtitle = document.getElementById("menu-subtitle");

        let score = 0;
        let hiScore = localStorage.getItem("catGameHiScore") || 0;
        let isAlive = false;
        let gameSpeed = 1.0; // 🐢 ปรับให้ช้าสุดขีดเท่าที่เป็นไปได้ เหมือนเต่าคลาน!
        let cactusLeft = 400;
        let backgroundPos = 0;
        let gameLoopActive = false; // ป้องกันบั๊กเกิดใหม่แล้วเร็วขึ้น

        const obstacleImages = [
            'https://i.postimg.cc/bwR36dVK/mi-m-ch-x-298-20260404141505.png', // ปลา
            'https://i.postimg.cc/zB4jLh3f/mi-m-ch-x-298-20260404141507.png'  // กล่อง
        ];

        hiScoreDisplay.innerText = "สูงสุด: " + hiScore;

        function setRandomObstacle() {
            const randomIndex = Math.floor(Math.random() * obstacleImages.length);
            cactus.style.backgroundImage = `url('${obstacleImages[randomIndex]}')`;
        }

        function jump() {
            if (!dino.classList.contains("jump") && isAlive) {
                dino.classList.add("jump");
                dino.classList.add("jumping");
                
                setTimeout(function () {
                    dino.classList.remove("jump");
                    dino.classList.remove("jumping");
                }, 800); // 0.8 วินาที (ปรับตามอนิเมชั่น)
            }
        }

        // ฟังก์ชันสั่งงานด้วยการแตะ
        function triggerAction(e) {
            e.preventDefault(); // ป้องกันระบบการซูมของแอปมือถือ

            if (!isAlive) {
                // ถ้าเกมยังไม่เริ่ม ให้เริ่มเกม
                menuOverlay.style.display = "none";
                isAlive = true;
                score = 0;
                gameSpeed = 1.0; // ความเร็วเริ่มต้นช้ามาก
                cactusLeft = 400;
                scoreDisplay.innerText = "คะแนน: 0";
                dino.classList.add("walking");
                setRandomObstacle();
                if (!gameLoopActive) {
                    gameLoop(); // เริ่มลูปเกมถ้ายังไม่ได้รัน
                }
            } else {
                // ถ้าเกมเริ่มแล้ว ให้กระโดด
                jump();
            }
        }

        // จับจุดแตะที่ตัวฉากเกมเพื่อเล่น/กระโดด (ใช้ได้ชัวร์บนมือถือ)
        gameContainer.addEventListener("touchstart", triggerAction);
        gameContainer.addEventListener("mousedown", triggerAction); // เผื่อเล่นในคอม

        function gameLoop() {
            if (!isAlive) {
                gameLoopActive = false; // หยุดลูปเกมเมื่อตาย
                return;
            }
            gameLoopActive = true; // ยืนยันว่าลูปเกมทำงานอยู่

            backgroundPos -= gameSpeed / 2;
            gameContainer.style.backgroundPosition = backgroundPos + "px 0";

            cactusLeft -= gameSpeed;
            if (cactusLeft < -60) {
                cactusLeft = 400;
                setRandomObstacle();
                score++;
                scoreDisplay.innerText = "คะแนน: " + score;
                
                // ค่อยๆ เพิ่มความเร็วแบบเนิบๆ ทุกๆ 5 คะแนน (ไกลขึ้นก่อนค่อยเร็วขึ้น)
                if (score % 5 === 0 && gameSpeed < 8) {
                    gameSpeed += 0.3;
                }
            }
            cactus.style.left = cactusLeft + "px";

            let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));

            // 💥 เช็กการชน (น้องแมวอยู่แถว left: 30px ถึง 130px)
            if (cactusLeft < 110 && cactusLeft > 10 && dinoBottom <= 60) {
                isAlive = false;
                dino.classList.remove("walking");
                
                if (score > hiScore) {
                    hiScore = score;
                    localStorage.setItem("catGameHiScore", hiScore);
                    hiScoreDisplay.innerText = "สูงสุด: " + hiScore;
                }

                menuTitle.innerText = "จบเกม! ได้ " + score + " คะแนน";
                menuSubtitle.innerText = "แตะที่หน้าจออีกครั้งเพื่อเริ่มใหม่";
                menuOverlay.style.display = "flex";
            }

            if (isAlive) {
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
